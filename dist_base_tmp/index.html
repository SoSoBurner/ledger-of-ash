<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger of Ash — Upgrade Batch 21</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <section id="screen-title" class="screen active">
      <div class="title-wrap card">
        <h1>Ledger of Ash</h1>
        <p class="sub">Upgrade Batch 21 — family milestones, authored late-stage route progress, gated endgame commits, and richer boss behavior</p>
        <div class="title-grid">
          <div>
            <h2>Load Legend</h2>
            <input id="load-code" placeholder="4-digit passcode" maxlength="4" />
            <button id="btn-load">Enter</button>
            <div id="load-status" class="status"></div>
          </div>
          <div>
            <h2>Begin New Legend</h2>
            <label>Name</label>
            <input id="new-name" placeholder="Traveler name" />
            <label>Passcode</label>
            <input id="new-passcode" placeholder="4 digits" maxlength="4" />
            <label>Archetype</label>
            <select id="new-archetype"></select>
            <label>Background</label>
            <select id="new-background"></select>
            <label>Starting Bonus</label>
            <select id="new-bonus"></select>
            <button id="btn-new">Begin Your Legend</button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-game" class="screen">
      <header class="topbar card">
        <div>
          <strong>Ledger of Ash</strong>
          <span id="header-stage"></span>
        </div>
        <nav>
          <button data-open="map">Map</button>
          <button data-open="journal">Journal</button>
          <button data-open="npcs">NPCs</button>
          <button data-open="notices">Notices</button>
          <button data-open="camp">Camp</button>
          <button data-open="sheet">Sheet</button>
          <button data-open="legends">Legends</button>
          <button id="btn-end">End</button>
        </nav>
      </header>

      <section class="hud card">
        <div><span class="label">Name</span><span id="hud-name"></span></div>
        <div><span class="label">Class</span><span id="hud-class"></span></div>
        <div><span class="label">Background</span><span id="hud-background"></span></div>
        <div><span class="label">Level</span><span id="hud-level"></span></div>
        <div><span class="label">Renown</span><span id="hud-renown"></span></div>
        <div><span class="label">HP</span><span id="hud-hp"></span></div>
        <div><span class="label">Status</span><span id="hud-status"></span></div>
        <div><span class="label">Gold</span><span id="hud-gold"></span></div>
      </section>

      <section class="location card">
        <div class="location-line">
          <div id="hud-location"></div>
          <div id="hud-time"></div>
        </div>
        <div id="hud-objective" class="objective"></div>
      </section>

      <section id="central-narrative" class="card narrative"></section>
      <section id="result-panel" class="card result"></section>
      <section id="choices" class="choices"></section>
    </section>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-card card">
        <div class="overlay-head">
          <h2 id="overlay-title"></h2>
          <button id="overlay-close">×</button>
        </div>
        <div id="overlay-body"></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/narrative.js"></script>
  <script src="js/party.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
