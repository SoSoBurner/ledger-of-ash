<!doctype html>
<html>
<head>
  <meta charset='utf-8'>

  <title>Ledger of Ash — Upgrade Batch 27</title>
  <style>
    :root{--bg:#0f0d0a;--panel:#17120d;--panel2:#1d1711;--line:#4d3b25;--line2:#6d5637;--text:#f0e7d0;--muted:#c9b99b;--accent:#d4b67a;--good:#98c18f;--warn:#c9a46b;--bad:#c27f7f}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top,#18120c 0%,#0f0d0a 60%);color:var(--text);font:16px/1.45 Georgia,serif}
    .wrap{max-width:1180px;margin:0 auto;padding:14px}
    .top{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;justify-content:space-between}
    .titleBlock h1{margin:0 0 4px 0;font-size:28px}
    .muted{color:var(--muted)}
    .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .bar button,.choice,.small,.inlineBtn{background:linear-gradient(180deg,#241b12,#1a140e);color:var(--text);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;cursor:pointer;box-shadow:0 0 0 1px rgba(255,255,255,.03) inset}
    .bar button.active{border-color:var(--accent);color:#fff8e6}
    #narrative{border-left:4px solid var(--accent);background:linear-gradient(90deg,rgba(212,165,116,.06),rgba(212,165,116,.02));font-size:16px;line-height:1.6;color:#f0e7d0}
    .card{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:12px;padding:12px;margin:8px 0}
    .hero{display:grid;grid-template-columns:1fr;gap:10px}
    .grid{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(320px,.75fr);gap:14px;align-items:start}
    .stack{display:grid;gap:8px}
    .panel{display:none}
    .panel.active{display:block}
    .sectionTitle{font-weight:bold;letter-spacing:.04em;text-transform:uppercase;color:#ead9b5;font-size:13px;margin-bottom:6px}
    .choice{display:block;width:100%;text-align:left;margin:8px 0}
    .choice small{display:block;color:var(--muted);margin-top:4px}
    .pillRow{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .pill{font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid var(--line2);background:#130f0b;color:#e8dcc5}
    .pill.good{border-color:#5a7b53;color:#cfe7c8}
    .pill.warn{border-color:#8b7042;color:#efd5aa}
    .pill.bad{border-color:#8a5555;color:#f0c3c3}
    input,select{background:#0f0d0b;color:var(--text);border:1px solid var(--line2);border-radius:8px;padding:9px 10px;min-width:0}
    .form{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
    .subgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .poiline{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px 0;border-top:1px solid rgba(255,255,255,.05)}
    .poiline:first-child{border-top:none;padding-top:0}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, monospace}
    .notice-list{display:grid;gap:0}
    .notice-list .card{margin:0;border-bottom:1px solid var(--line);border-radius:0;border-left:3px solid var(--accent);padding:14px 12px;background:linear-gradient(90deg,rgba(212,165,116,.03),rgba(212,165,116,.01))}
    .notice-list .card:first-child{border-top-left-radius:12px;border-top-right-radius:12px}
    .notice-list .card:last-child{border-bottom-left-radius:12px;border-bottom-right-radius:12px;border-bottom:1px solid var(--line)}
    .notice-list .card:hover{border-left-color:#f0e7d0;background:linear-gradient(90deg,rgba(212,165,116,.08),rgba(212,165,116,.04))}
    @media (max-width:940px){.grid,.form,.subgrid{grid-template-columns:1fr}.bar{justify-content:flex-start}.card{padding:10px;margin:6px 0}.notice-list .card{padding:12px 10px;margin:0}}
  </style>
</head>

    </div>

  <script>
    document.addEventListener('click', (e)=>{
      const btn = e.target.closest('[data-panel]');
      if(!btn) return;
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.bar button').forEach(b=>b.classList.remove('active'));
      const target = document.getElementById(btn.dataset.panel);
      if(target) target.classList.add('active');
      btn.classList.add('active');
    });
  </script>

  <script>
(function(){
  function pick(arr, n){ return arr && arr.length ? arr[n % arr.length] : ''; }

  function classSense(state){
    const a = (window.ARCHETYPES||[]).find(x=>x.id===state.archetype) || {group:'combat'};
    if(a.group==='combat') return 'Bodies, spacing, weight, and the meaning of cover read first.';
    if(a.group==='magic') return 'Ward strain, charged residue, ritual order, and unstable materials rise to the surface first.';
    if(a.group==='stealth') return 'Sightlines, timing gaps, watched corners, and exit paths stand out before anything louder does.';
    return 'Practical weakness, frayed discipline, and who still has enough structure to help become obvious first.';
  }

  function cap(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  function localityNarrative(state, loc, ctx){
    const time = ['dawn','morning','midday','late day','night'][state.timeIndex % 5];
    const pressure = ctx.pressure || pick(loc.pressures, state.worldClocks.pressure);
    const greeting = pick(loc.greetings, state.dayCount + state.stage);
    const ritual = pick(loc.rituals, state.dayCount + state.worldClocks.omens);

    // Seed varies with time and pressure clock so text shifts after each action
    const seed = (state.dayCount + state.timeIndex + state.worldClocks.pressure) % 4;

    // Opening: situate in place and time — four rotations
    const opens = [
      `${loc.name} at ${time}. ${loc.summary}`,
      `The ${time} settles into ${loc.name} — ${loc.summary.toLowerCase()}`,
      `${loc.name} keeps its shape into ${time}: ${loc.summary.toLowerCase()}`,
      `At ${time}, ${loc.name} holds to what it is — ${loc.summary.toLowerCase()}`
    ];

    // Pressure: woven as scene texture, not a label
    const pressures = [
      `${cap(pressure)} runs underneath the surface and has changed how people move through this space.`,
      `The running strain here is ${pressure}. It shows in how thresholds are held and how people time their movements.`,
      `${cap(pressure)} has altered the usual patterns — caution is more deliberate than it was.`,
      `The current weight is ${pressure}. Locals have adapted, but the adaptation is visible.`
    ];

    // Social texture: greeting + ritual woven as observation
    const greetingLines = [
      `The usual approach here runs through ${greeting}.`,
      `${cap(greeting)} mark how people signal intent in this space.`,
      `Exchanges tend to open with ${greeting}.`,
      `The expected register is ${greeting}.`
    ];
    const ritualLines = [
      `${cap(ritual)} are present and close to the surface.`,
      `The nearby practice of ${ritual} sits visible to anyone reading the scene.`,
      `${cap(ritual)} mark what this place keeps near.`,
      `Someone close by is keeping ${ritual}.`
    ];

    // Route and pressure chain hints
    const details = [];
    if(ctx.routeHint) details.push(`The ${ctx.routeHint.toLowerCase()} runs ${ctx.routeStyle||'uncertain'} through here — the risk reads as ${ctx.routeRisk||'unclear'}.`);
    if(ctx.familyHint && state.stage >= 2) details.push(`${ctx.familyHint} is the shape the widening pressure takes.`);
    if(ctx.hazardHint) details.push(`Signs of ${ctx.hazardHint.replace(/_/g,' ')} are legible in how people hold themselves.`);
    if(ctx.creatureHint) details.push(`The margin people keep from the edges suggests ${ctx.creatureHint.replace(/_/g,' ')} has not entirely cleared.`);
    if(ctx.destinationHint) details.push(ctx.destinationHint);
    if(ctx.serviceHint) details.push(`${ctx.serviceHint} carries more weight than it did before.`);

    const parts = [
      opens[seed],
      pressures[seed],
      greeting ? greetingLines[seed] : '',
      ritual ? ritualLines[seed] : '',
      ...details,
      classSense(state)
    ];

    return parts.filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
  }

    return text || 'The place settles into a new shape, and the next choice now belongs to that altered space.';
  }

    const bg = ((window.BACKGROUNDS||{})[state.archetype]||[]).find(b=>b.id===state.backgroundId) || {name:'Unknown Hand', theme:'local strain'};
    const loc = (window.KEY_LOCALITIES||{})[state.location] || {name:'Unknown locality', summary:'an uncertain place'};
    return `${state.name}, ${state.age}, ${state.presentation.toLowerCase()}, ${state.lineage}, comes out of ${loc.name} through a life shaped by ${bg.theme}. ${arch.name} is not a title here so much as the way pressure has already taught the body and mind to answer. ${loc.summary} is the world that produced this start.`;
  }

  function legendSummary(legend){
    const pieces = [];
    pieces.push(`${legend.name} of ${legend.originLocalityName}, ${legend.archetypeName} / ${legend.backgroundName}.`);
    if(legend.lifeOverview) pieces.push(legend.lifeOverview);
    if (legend.keyMoments && legend.keyMoments.length) pieces.push(`Key moments: ${legend.keyMoments.slice(0,3).join(' | ')}`);
    if (legend.safeZones && legend.safeZones.length) pieces.push(`Safe zones: ${legend.safeZones.slice(0,3).join(' → ')}`);
    if (legend.routeScoutLog && legend.routeScoutLog.length) pieces.push(`Route memory: ${legend.routeScoutLog.slice(0,2).join(' | ')}`);
    if (legend.companions && legend.companions.length) pieces.push(`Companions: ${legend.companions.join(', ')}`);
    if (legend.finalOutcome) pieces.push(`Outcome: ${legend.finalOutcome}.`);
    if (legend.stage5Dead) pieces.push(`The legend ended in Stage V permadeath.`);
    return pieces.join(' ');
  }

  window.localityNarrative = localityNarrative;
  window.resultNarrative = resultNarrative;
  window.lifeOverviewText = lifeOverview;
  window.legendSummary = legendSummary;
})();

// ── COMPANION STATE MANAGEMENT ──────────────────────────
function initCompanions() {
  if (!G.companions) G.companions = {};
}

function getCompanion(id) {
  if (!G.companions) return null;
  return G.companions[id] || null;
}

function hasCompanion(id) {
  return !!(G.companions && G.companions[id] && G.companions[id].status === 'active');
}

function getActiveCompanions() {
  if (!G.companions) return [];
  return Object.values(G.companions).filter(c => c.status === 'active');
}

function canRecruit(npcId) {
  const def = Object.values(COMPANION_DEFS).find(d => d.npcId === npcId);
  if (!def) return false;
  if (hasCompanion(def.id)) return false;
  const trust = G.npcMemory && G.npcMemory[npcId] ? G.npcMemory[npcId].trust : 0;
  return trust >= 15;
}

function showRecruitScene(npcId) {
  const def = Object.values(COMPANION_DEFS).find(d => d.npcId === npcId);
  if (!def) return;

  document.querySelectorAll('.choice-block,.move-block').forEach(b => b.remove());
  addNarration(def.name, def.joinScene.text);

  const choices = def.joinScene.choices.map(c => ({
    text: c.text,
    skill: 'persuasion',
    tag: c.outcome === 'join' ? 'safe' : c.outcome === 'negotiate' ? 'risky' : 'bold',
    align: c.outcome === 'join' ? 'good' : 'neutral',
    cid: '__recruit__' + def.id + '__' + c.outcome
  }));

  setTimeout(() => renderChoices(choices), 300);
}

function resolveRecruitChoice(defId, outcome) {
  const def = COMPANION_DEFS[defId];
  if (!def) return;
  initCompanions();

  if (outcome === 'join' || outcome === 'negotiate') {
    // Join (negotiate leads to same outcome — they still join)
    G.companions[defId] = {
      id: defId,
      name: def.name,
      role: def.role,
      status: 'active',
      trust: G.npcMemory && G.npcMemory[def.npcId] ? G.npcMemory[def.npcId].trust : 15,
      campLineIdx: 0,
      injured: false,
      injuredDay: null,
      joinedDay: G.dayCount || 0,
      locality: def.locality,
      role_tag: def.role_tag
    };

    const joinText = outcome === 'negotiate'
      ? def.name + ' considers for a moment, then nods. They join you.'
      : def.name + ' stands and gathers their things. They are with you now.';

    addNarration('', joinText, 'success');
    addJournal('Companion joined: ' + def.name + ' (' + def.role + ').');
    G.history.push('Recruited ' + def.name + ' at ' + (G.dayCount||0) + '.');
    addWorldNotice('[PARTY] ' + def.name + ' has joined your investigation.');

    if (typeof updateHUD === 'function') updateHUD();
    if (typeof saveGame === 'function') saveGame();

    setTimeout(() => renderChoices([
      { text: 'Continue the investigation together.', skill: 'lore', tag: 'safe', align: 'neutral', cid: 'passive_intel' },
      { text: 'Camp and hear what they know before moving.', skill: 'survival', tag: 'safe', align: 'neutral', cid: '__camp_talk__' }
    ]), 400);

  } else {
    addNarration('', def.refusalScene);
    setTimeout(() => renderChoices([
      { text: 'Continue alone.', skill: 'lore', tag: 'safe', align: 'neutral', cid: 'passive_intel' }
    ]), 300);
  }
}

// Check companion leave conditions
function checkCompanionLeave() {
  if (!G.companions) return;
  Object.values(G.companions).forEach(comp => {
    if (comp.status !== 'active') return;
    const def = COMPANION_DEFS[comp.id];
    if (!def) return;
    def.leaveConditions.forEach(condition => {
      let shouldLeave = false;
      if (condition === 'morality < -40' && (G.morality||0) < -40) shouldLeave = true;
      if (condition === 'morality < -30' && (G.morality||0) < -30) shouldLeave = true;
      if (condition === 'morality < -20' && (G.morality||0) < -20) shouldLeave = true;
      if (condition === 'order < -50' && (G.order||0) < -50) shouldLeave = true;
      if (condition === 'order > 70 and morality < -10' && (G.order||0) > 70 && (G.morality||0) < -10) shouldLeave = true;
      if (shouldLeave) {
        comp.status = 'left';
        addNarration(comp.name, def.leaveScene);
        addJournal(comp.name + ' has left the party.');
        addWorldNotice('[PARTY] ' + comp.name + ' has left your investigation.');
        if (typeof updateHUD === 'function') updateHUD();
      }
    });
  });
}

// ── CAMP TALK ──────────────────────────────────────────
function showCampTalk() {
  const active = getActiveCompanions();
  if (!active.length) {
    addNarration('Camp', 'You are traveling alone. No companions to talk to.');
    renderChoices([{ text: 'Break camp.', skill: 'lore', tag: 'safe', align: 'neutral', cid: 'passive_intel' }]);
    return;
  }

  const lines = [];
  active.forEach(comp => {
    const def = COMPANION_DEFS[comp.id];
    if (!def) return;
    if (comp.injured) {
      lines.push({ name: comp.name, text: def.injuredText, injured: true });
    } else {
      const idx = comp.campLineIdx % def.campLines.length;
      lines.push({ name: comp.name, text: def.campLines[idx], injured: false });
      comp.campLineIdx++;
    }
  });

  let html = '<div style="margin-bottom:12px;color:var(--gold-dim);font-family:Cinzel,serif;font-size:10px;letter-spacing:2px">AROUND THE FIRE</div>';
  lines.forEach(l => {
    html += '<div class="camp-talk-line' + (l.injured ? ' injured' : '') + '">';
    html += '<div class="ct-name">' + l.name + (l.injured ? ' (injured)' : '') + '</div>';
    html += '<div class="ct-text">' + l.text + '</div></div>';
  });

  addNarration('Camp Talk', html);

  // After talk: skills can improve
  const choices = [
    { text: 'Press on. The fire has told you enough.', skill: 'lore', tag: 'safe', align: 'neutral', cid: 'passive_intel' },
    { text: 'Ask them directly about the investigation.', skill: 'persuasion', tag: 'safe', align: 'neutral', cid: 'probe_order_origin' }
  ];

  // Add companion ability choices
  active.forEach(comp => {
    const def = COMPANION_DEFS[comp.id];
    if (!def || comp.injured) return;
    def.abilities.filter(a => a.type === 'active').forEach(ability => {
      choices.push({
        text: '[' + comp.name + '] ' + ability.desc.split(':')[0] + '.',
        skill: 'persuasion', tag: 'safe', align: 'neutral',
        cid: 'passive_intel'  // feeds into normal flow
      });
    });
  });

  setTimeout(() => renderChoices(choices.slice(0, 4)), 300);
}

// ── PARTY HUD + OVERLAY ────────────────────────────────
function updatePartyHUD() {
  const el = document.getElementById('party-hud');
  if (!el) return;
  const active = getActiveCompanions();
  if (!active.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="party-label">Party</div>' +
    active.map(c => {
      const statusClass = c.injured ? 'injured' : 'active';
      return '<div class="party-member ' + statusClass + '">' +
        '<span class="pm-name">' + c.name + '</span>' +
        '<span class="pm-role">' + (COMPANION_DEFS[c.id] ? COMPANION_DEFS[c.id].role_tag : '') + '</span>' +
        (c.injured ? '<span class="pm-status">injured</span>' : '') +
        '</div>';
    }).join('');
}

function showPartyOverlay() {
  const el = document.getElementById('party-overlay-body');
  if (!el) return;
  const active = getActiveCompanions();
  const all = G.companions ? Object.values(G.companions) : [];

  if (!all.length) {
    el.innerHTML = '<div style="color:var(--ink-faint);font-style:italic;font-size:13px">No companions recruited yet. Approach local contacts and build trust to unlock recruit scenes.</div>';
  } else {
    el.innerHTML = all.map(comp => {
      const def = COMPANION_DEFS[comp.id];
      if (!def) return '';
      const statusLabel = comp.status === 'active' ? (comp.injured ? 'Injured' : 'Active') : 'Left the party';
      const statusColor = comp.status === 'active' ? (comp.injured ? 'var(--blood-bright)' : 'var(--jade-bright)') : 'var(--ink-faint)';
      return '<div class="companion-card">' +
        '<div class="companion-name">' + comp.name + '</div>' +
        '<div class="companion-role">' + def.role + '</div>' +
        '<div style="color:' + statusColor + ';font-size:11px;font-family:Cinzel,serif;letter-spacing:1px;margin:4px 0">' + statusLabel + '</div>' +
        '<div class="companion-abilities">' +
          def.abilities.map(a => '<div class="comp-ability"><strong>' + a.type + ':</strong> ' + a.desc + '</div>').join('') +
        '</div>' +
        (comp.status === 'active' && !comp.injured ? '<div style="font-size:11px;color:var(--ink-faint);margin-top:6px">Joined day ' + comp.joinedDay + '</div>' : '') +
        '</div>';
    }).join('');
  }

  showOverlay('overlay-party');
}

// Companion ability passive bonuses applied to rolls
function getCompanionRollBonus(skill) {
  const active = getActiveCompanions();
  let bonus = 0;
  active.forEach(comp => {
    if (comp.injured) return;
    const def = COMPANION_DEFS[comp.id];
    if (!def) return;
    // Vera: persuasion in Shelkopolis
    if (def.id === 'vera_wren' && skill === 'persuasion' && G.location === 'shelkopolis') bonus += 1;
    // Toriel: lore relating to bodies (lore checks generally)
    if (def.id === 'toriel_palevow' && skill === 'lore') bonus += 1;
    // Neren: survival during axis events
    if (def.id === 'neren_rimebridge' && skill === 'survival' && G.axisInverted) bonus += 2;
    // Elyra: survival always, stealth in wilderness
    if (def.id === 'elyra_mossbane' && skill === 'survival') bonus += 1;
    if (def.id === 'elyra_mossbane' && skill === 'stealth') bonus += 1;
  });
  return bonus;
}

// Engine interface: engine.js calls window.companionBonus(state, skill)
// state.companions is an array of {id, ...} in engine.js architecture
function companionBonus(state, skill) {
  if (!state || !state.companions || !state.companions.length) return 0;
  let bonus = 0;
  state.companions.forEach(comp => {
    if (comp.injured || comp.available === false) return;
    const def = COMPANION_DEFS[comp.id];
    if (!def) return;
    if (def.id === 'vera_wren' && skill === 'persuasion' && state.location === 'shelkopolis') bonus += 1;
    if (def.id === 'toriel_palevow' && skill === 'lore') bonus += 1;
    if (def.id === 'neren_rimebridge' && skill === 'survival') bonus += 1;
    if (def.id === 'elyra_mossbane' && skill === 'survival') bonus += 1;
    if (def.id === 'elyra_mossbane' && skill === 'stealth') bonus += 1;
  });
  return bonus;
}

window.COMPANION_DEFS = COMPANION_DEFS;
window.companionBonus = companionBonus;

// ── COMBAT STATE ─────────────────────────────────────────
let CS = null; // active combat session

function startCombat(enemyTemplateId, context) {
  const tpl = ENEMY_TEMPLATES[enemyTemplateId];
  if (!tpl) return;
  const entryBonus = (context && context.entryBonus) ? context.entryBonus : 0;
  CS = {
    enemy: Object.assign({}, tpl, { id: enemyTemplateId }),
    round: 1,
    entryBonus: entryBonus,
    playerActed: false,
    context: context || {},
    log: []
  };
  document.querySelectorAll('.choice-block,.move-block,.levelup-block').forEach(b => b.remove());
  renderCombatRound();
}

function renderCombatRound() {
  if (!CS) return;
  const archId = G.archetype || 'warrior';
  const abilities = ARCHETYPE_COMBAT_ABILITIES[archId] || [];
  const usableAbilities = abilities.filter(a => {
    const sk = G.skills[a.skillReq] || 0;
    return sk >= a.minSkill;
  });

  const pct = CS.enemy.hp / CS.enemy.maxHp;
  const ePct = Math.round(pct * 100);
  const eStatus = pct > 0.6 ? 'Active' : pct > 0.3 ? 'Wounded' : 'Critical';

  let html = '<div class="combat-header">' +
    '<div class="combat-title">&#x2694; COMBAT &#x2014; Round ' + CS.round + '</div>' +
    '<div class="combat-enemy">' +
      '<div class="enemy-name">' + CS.enemy.name + '</div>' +
      '<div class="enemy-desc">' + CS.enemy.desc + '</div>' +
      '<div class="enemy-hp-row">' +
        '<div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:' + ePct + '%"></div></div>' +
        '<span class="enemy-status ' + (pct < 0.3 ? 'danger' : '') + '">' + eStatus + '</span>' +
      '</div>' +
    '</div>' +
    '</div>';

  // Show d20 roll info
  html += '<div class="combat-actions"><div class="choice-label">Choose your action:</div><div class="choices">';

  // Base attacks
  html += '<button class="choice-btn combat-btn" data-action="attack">' +
    '<span class="choice-text">Strike — direct attack</span>' +
    '<span class="choice-meta"><span class="choice-skill">combat</span><span class="choice-tag bold">attack</span></span>' +
    '</button>';

  // Defend
  html += '<button class="choice-btn combat-btn" data-action="defend">' +
    '<span class="choice-text">Defend — focus on protection this round</span>' +
    '<span class="choice-meta"><span class="choice-skill">survival</span><span class="choice-tag safe">defense</span></span>' +
    '</button>';

  // Archetype abilities
  usableAbilities.slice(0,2).forEach(ab => {
    html += '<button class="choice-btn combat-btn" data-action="ability" data-ability="' + ab.id + '">' +
      '<span class="choice-text">' + ab.name + ' — ' + ab.effect + '</span>' +
      '<span class="choice-meta"><span class="choice-skill">' + ab.skillReq + '</span><span class="choice-tag risky">ability</span></span>' +
      '</button>';
  });

  // Attempt to flee
  html += '<button class="choice-btn combat-btn" data-action="flee">' +
    '<span class="choice-text">Flee — break from combat</span>' +
    '<span class="choice-meta"><span class="choice-skill">survival</span><span class="choice-tag risky">risky</span></span>' +
    '</button>';

  html += '</div></div>';

  const el = document.getElementById('narrative-content');
  const block = document.createElement('div');
  block.className = 'scene-block combat-block';
  block.innerHTML = html;
  block.querySelectorAll('.combat-btn').forEach(btn => {
    btn.addEventListener('click', () => resolveCombatAction(btn.dataset.action, btn.dataset.ability));
  });
  el.appendChild(block);
  scrollNarrative();
}

function resolveCombatAction(action, abilityId) {
  document.querySelectorAll('.combat-block').forEach(b => b.remove());
  const archId = G.archetype || 'warrior';
  const combatSkill = G.skills.combat || 0;
  const survSkill = G.skills.survival || 0;
  const traitCombatBonus = getTraitBonus('combat');

  let resultText = '';
  let playerDamage = 0;
  let enemyDamage = 0;
  let isVictory = false;
  let isFled = false;
  let resultType = 'success';

  const d20 = () => Math.floor(Math.random() * 20) + 1;

  if (action === 'attack') {
    const roll = d20();
    const total = roll + combatSkill + traitCombatBonus + (G._traitBonus && G._traitBonus.skill === 'combat' ? G._traitBonus.bonus : 0);
    if (G._traitBonus && G._traitBonus.skill === 'combat') G._traitBonus = null;
    const hit = total >= CS.enemy.defense + 5;
    const baseDmg = hit ? Math.floor(Math.random() * 6) + combatSkill + 1 : 0;

    // Enemy counter-attack
    const eRoll = d20();
    const eHit = eRoll + CS.enemy.attack >= (combatSkill + survSkill + 8);
    enemyDamage = eHit ? Math.floor(Math.random() * 4) + CS.enemy.attack - 3 : 0;
    enemyDamage = Math.max(0, enemyDamage);

    resultText = '<strong>d20 roll: ' + roll + '</strong> + combat ' + combatSkill + (traitCombatBonus ? ' + trait ' + traitCombatBonus : '') + ' = <strong>' + total + '</strong><br>';

    if (hit) {
      CS.enemy.hp = Math.max(0, CS.enemy.hp - baseDmg);
      playerDamage = baseDmg;
      resultText += 'Your strike connects. <em>' + CS.enemy.name + '</em> takes ' + baseDmg + ' damage.';
      resultType = 'success';
    } else {
      resultText += 'Your strike is deflected. ' + CS.enemy.name + ' holds their ground.';
      resultType = 'failure';
    }

    if (enemyDamage > 0) {
      resultText += '<br>The enemy retaliates — you take ' + enemyDamage + ' damage.';
      applyWound(enemyDamage, 'from ' + CS.enemy.name);
    }

  } else if (action === 'defend') {
    const roll = d20();
    const total = roll + survSkill;
    const defended = total >= 10;
    // Enemy still attacks but reduced
    const eRoll = d20();
    const eBase = Math.floor(Math.random() * 4) + CS.enemy.attack - 3;
    enemyDamage = defended ? Math.max(0, Math.floor(eBase * 0.4)) : Math.max(0, eBase);

    resultText = '<strong>d20 roll: ' + roll + '</strong> + survival ' + survSkill + ' = <strong>' + total + '</strong><br>';
    resultText += defended ? 'You take a defensive stance. ' : 'Your guard is pushed.';
    if (enemyDamage > 0) {
      resultText += ' You take ' + enemyDamage + ' damage.';
      applyWound(enemyDamage, 'from ' + CS.enemy.name);
    } else {
      resultText += ' You absorb the assault unscathed.';
    }
    resultType = defended ? 'success' : 'partial';

  } else if (action === 'ability' && abilityId) {
    const allAbilities = ARCHETYPE_COMBAT_ABILITIES[archId] || [];
    const ab = allAbilities.find(a => a.id === abilityId);
    if (ab) {
      const sk = G.skills[ab.skillReq] || 0;
      const roll = d20();
      const total = roll + sk;
      const success = total >= 10;

      resultText = '<strong>' + ab.name + '</strong>: d20 roll ' + roll + ' + ' + ab.skillReq + ' ' + sk + ' = ' + total + '<br>';

      if (success) {
        // Apply ability effects
        if (ab.id === 'lay_on_hands' || ab.id === 'communal_aid' || ab.id === 'field_triage' || ab.id === 'emergency_repair') {
          const healed = Math.floor(Math.random() * 8) + (G.skills.persuasion || G.skills.craft || 1);
          G.hp = Math.min(G.maxHp, G.hp + healed);
          resultText += 'You restore ' + healed + ' HP. ' + ab.effect;
          updateHUD();
        } else if (ab.id === 'rage_surge' || ab.id === 'smite') {
          const costHp = ab.id === 'rage_surge' ? 4 : 3;
          G.hp = Math.max(1, G.hp - costHp);
          const bonusDmg = Math.floor(Math.random() * 6) + (ab.id === 'rage_surge' ? 4 : 5);
          CS.enemy.hp = Math.max(0, CS.enemy.hp - bonusDmg);
          resultText += 'Cost ' + costHp + ' HP. Deal ' + bonusDmg + ' bonus damage. ' + ab.effect;
          updateHUD();
        } else {
          // Generic ability success — deal moderate damage + effect
          const bonusDmg = Math.floor(Math.random() * 4) + sk;
          CS.enemy.hp = Math.max(0, CS.enemy.hp - bonusDmg);
          resultText += 'Success. ' + ab.effect + '. Enemy takes ' + bonusDmg + ' damage.';
        }
        resultType = 'success';
      } else {
        // Enemy counter
        const eRoll = d20();
        enemyDamage = Math.max(0, Math.floor(Math.random() * 4) + CS.enemy.attack - 3);
        resultText += 'The ability misfires. The enemy exploits the opening. You take ' + enemyDamage + ' damage.';
        applyWound(enemyDamage, 'from ' + CS.enemy.name);
        resultType = 'failure';
      }
    }

  } else if (action === 'flee') {
    const roll = d20();
    const total = roll + survSkill;
    const success = total >= 12;

    resultText = '<strong>d20 roll: ' + roll + '</strong> + survival ' + survSkill + ' = <strong>' + total + '</strong><br>';

    if (success) {
      resultText += 'You break from the fight. The ' + CS.enemy.name + ' does not pursue.';
      isFled = true;
      resultType = 'partial';
      // Fleeing costs renown and alignment
      G.renown = Math.max(0, G.renown - 1);
      shiftAlignment(-3, -3);
    } else {
      // Takes a hit while fleeing
      enemyDamage = Math.floor(Math.random() * 6) + 2;
      applyWound(enemyDamage, 'attack of opportunity from ' + CS.enemy.name);
      resultText += 'You are struck as you attempt to break. You take ' + enemyDamage + ' damage and barely escape.';
      isFled = true;
      resultType = 'failure';
    }
  }

  CS.log.push({ round: CS.round, action, result: resultType });
  addNarration('Round ' + CS.round, resultText, resultType);

  // Check enemy flee
  const eFleePct = CS.enemy.hp / CS.enemy.maxHp;
  if (!isFled && CS.enemy.hp <= 0) {
    isVictory = true;
    endCombat(true);
    return;
  }
  if (!isFled && eFleePct <= CS.enemy.fleeThreshold) {
    const eFlee = d20() <= 10;
    if (eFlee) {
      addNarration('', '<em>' + CS.enemy.name + ' breaks and retreats. The fight is over.</em>', 'success');
      endCombat(true);
      return;
    }
  }

  if (isFled) {
    endCombat(false);
    return;
  }

  CS.round++;
  setTimeout(() => renderCombatRound(), 500);
}

function applyWound(damage, source) {
  if (damage <= 0) return;
  G.hp = Math.max(0, G.hp - damage);
  // Track wounds
  if (!G.wounds) G.wounds = [];
  if (damage >= 5) {
    G.wounds.push({ desc: source, severity: damage >= 8 ? 'severe' : 'minor', round: CS ? CS.round : 0 });
    if (damage >= 8) {
      if (!G.fatigue) G.fatigue = 0;
      G.fatigue = Math.min(10, G.fatigue + 2);
    }
  }
  if (G.hp <= 0) {
    G.hp = 1;
    G.recoveryState = 'critical';
    addNarration('', '<em style="color:var(--blood-bright)">You are critically wounded. You need immediate recovery.</em>');
  }
  updateHUD();
}

function endCombat(victory) {
  const enemy = CS.enemy;
  CS = null;

  if (victory) {
    const xpGain = Math.min(8, Math.floor(Math.random() * 4) + 4);
    const goldGain = enemy.loot ? enemy.loot.gold : 0;
    gainXP(xpGain);
    modGold(goldGain);
    G.renown = (G.renown || 0) + 1;

    let victText = 'You have defeated the <strong>' + enemy.name + '</strong>. ';
    if (goldGain) victText += '+' + goldGain + ' gold.';
    if (enemy.loot && enemy.loot.item) {
      if (!G.inventory) G.inventory = [];
      G.inventory.push({ name: enemy.loot.item, type: 'evidence', equipped: false });
      victText += ' Found: ' + enemy.loot.item + '.';
    }
    addNarration('Combat Over', victText, 'success');
    addJournal('Defeated ' + enemy.name + ' in ' + (CS ? CS.round : 'unknown') + ' rounds. Renown +1.');
    shiftAlignment(-5, 0); // violence costs morality slightly
    saveGame(); updateHUD();

    setTimeout(() => renderChoices([
      { text:'Search the area for more information.', skill:'lore', tag:'safe', align:'neutral', cid:'passive_intel' },
      { text:'Take what you need and move before anyone arrives.', skill:'stealth', tag:'risky', align:'chaotic', cid:'east_road' },
      { text:'Report what happened to the local authority.', skill:'persuasion', tag:'safe', align:'lawful', cid:'garrison_contact' }
    ]), 400);
  } else {
    addNarration('', 'You are out of the fight. Rest and recover before pressing further.', 'failure');
    saveGame();
    setTimeout(() => renderChoices([
      { text:'Make camp immediately.', skill:'survival', tag:'safe', align:'neutral', cid:'rest_recover' },
      { text:'Find a healer in the settlement.', skill:'persuasion', tag:'safe', align:'neutral', cid:'shrine_service' },
      { text:'Push forward despite the wounds.', skill:'combat', tag:'bold', align:'chaotic', cid:'passive_intel' }
    ]), 400);
  }
}

// Called from consequence nodes with: { type:'combat', enemy:'patrol_guard', context:{...} }
function triggerCombatEncounter(enemyId, context) {
  // Show combat entry opportunity first (TTRPG-consistent)
  document.querySelectorAll('.choice-block,.move-block').forEach(b => b.remove());
  const tpl = ENEMY_TEMPLATES[enemyId];
  if (!tpl) return;

  addNarration('', '<em style="color:var(--blood-bright)">A confrontation is imminent. <strong>' + tpl.name + '</strong> moves to intercept. ' + tpl.desc + '</em>');

  setTimeout(() => renderChoices([
    { text:'Stand your ground. This is a fight.', skill:'combat', tag:'bold', align:'chaotic',
      cid:'__combat__' + enemyId },
    { text:'Try to talk your way through before it comes to blows.', skill:'persuasion', tag:'risky', align:'lawful',
      cid:'garrison_contact' },
    { text:'Look for a way around before committing.', skill:'stealth', tag:'risky', align:'neutral',
      cid:'passive_intel' }
  ]), 300);
}

  }

  function beginEncounter(state, kind, name, tier){
    state.encounter={ kind, name:name||'unknown threat', tier:tier||'standard', round:1, started:state.dayCount, hp:kind==='creature'?(window.BESTIARY&&window.BESTIARY[name]?window.BESTIARY[name].hp:12):(window.HAZARDS&&window.HAZARDS[name]?window.HAZARDS[name].severity*4:8), maxHp:kind==='creature'?(window.BESTIARY&&window.BESTIARY[name]?window.BESTIARY[name].hp:12):(window.HAZARDS&&window.HAZARDS[name]?window.HAZARDS[name].severity*4:8) };
    const desc=kind==='creature'?(window.BESTIARY&&window.BESTIARY[name]?window.BESTIARY[name].text:'A threat emerges from the pressure.'):(window.HAZARDS&&window.HAZARDS[name]?window.HAZARDS[name].text:'A hazard breaks into the open.');
    state.lastResult=`${desc} The encounter demands an immediate answer.`;
  }

  function encounterChoices(state){
    const enc=state.encounter;
    if(!enc) return stage1Choices();
    const arch=getArchetype(state.archetype);
    const tierBonus=enc.tier==='elite'?3:enc.tier==='boss'?6:0;
    function resolve(skill,label,xpAmt,successText,failText){
      const roll=1+rand(20)+(state.skills[skill]||0)+Math.floor(state.level/3)+tierBonus;
      const target=enc.tier==='boss'?18:enc.tier==='elite'?15:12;
      const success=roll>=target;
      if(success){ gainXp(xpAmt,'encounter'); enc.hp=Math.max(0,enc.hp-Math.floor(state.level*1.5+5)); if(enc.hp<=0){ state.encounter=null; state.telemetry.wins++; state.gold+=rand(8)+3; state.lastResult=successText+` The threat is broken. (+${xpAmt} xp, gold gained)`; markMoment(`Defeated ${enc.name} at ${getLocality(state.location).name}`); } else { state.lastResult=successText+` The threat weakens but holds.`; } } else { const dmg=Math.max(1,rand(6)+(enc.tier==='boss'?6:enc.tier==='elite'?4:2)); state.hp=Math.max(0,state.hp-dmg); state.lastResult=failText+` You take ${dmg} damage (HP: ${state.hp}/${state.maxHp}).`; enc.round++; }
    }
    const choices=[
      {label:`Press forward directly — force the issue`,tags:['Combat','Direct'],fn(){ resolve('combat','direct assault',enc.tier==='boss'?4:2,'The line breaks under direct force.',`The direct approach costs something.`); if(state.hp<=0&&!state.stage5Dead) handleDeath(); else{setThreat();setObjective();persist();render();} }},
      {label:`Find the weakness and work it precisely`,tags:['Stealth','Precise'],fn(){ resolve('stealth','precision approach',enc.tier==='boss'?3:2,'The weak point opens and the threat unravels.','The precision read fails under pressure.'); if(state.hp<=0&&!state.stage5Dead) handleDeath(); else{setThreat();setObjective();persist();render();} }},
      {label:`Apply knowledge and read the threat structure`,tags:['Lore','Read'],fn(){ resolve('lore','analytical approach',enc.tier==='boss'?3:2,'The threat logic becomes legible and the answer follows.','The analytical read produces theory without enough time.'); if(state.hp<=0&&!state.stage5Dead) handleDeath(); else{setThreat();setObjective();persist();render();} }},
      {label:`Withdraw and regroup at the safe zone`,tags:['Retreat','Safe'],fn(){ state.encounter=null; advanceTime(1); state.hp=Math.max(1,state.hp); state.lastResult=`The threat is left behind. The safe zone holds for now.`; setThreat();setObjective();persist();render(); }}
    ];
    return choices;
  }

  function stage3to5Choices(stage){ const arr=objectiveWebChoices(stage).slice(0,5); if(stage===5 && G.finalBreak){ arr.push({label:'Commit to the final boss confrontation',tags:['Boss','Final'],fn(){ beginEncounter(G,'creature',G.currentThreat.creature,'boss'); }}); arr.push({label:'Commit to the final hazard confrontation',tags:['Boss','Final'],fn(){ beginEncounter(G,'hazard',G.currentThreat.hazard,'boss'); }}); } else { arr.push({label:'Force an elite confrontation now',tags:['Encounter','Elite'],fn(){ startThreatEncounter('elite'); }}); } arr.push({label:'Camp and re-form the line',tags:['Camp'],fn(){ G.lastResult='The camp settles nerves but the wider pressure does not stop moving.'; }}); return arr.slice(0,8); }
  function maybeStageAdvance(){ if(G.stage===1 && G.stageProgress[1]>=4 && G.level>=5){ G.stage=2; updateStage(); addNotice('Stage II begins. Adjacent pressure opens.'); markMoment('Stage II began'); } if(G.stage===2 && G.stageProgress[2]>=4 && G.level>=9){ G.stage=3; updateStage(); addNotice('Stage III begins. The world grows wider and less forgiving.'); markMoment('Stage III began'); } if(G.stage===3 && G.familyMilestones.stage3>=3 && G.level>=13){ G.stage=4; updateStage(); addNotice('Stage IV begins. Your name now changes what institutions dare.'); markMoment('Stage IV began'); } if(G.stage===4 && G.familyMilestones.stage4>=3 && G.level>=17){ G.stage=5; updateStage(); addNotice('Stage V begins. Death is now final.'); markMoment('Stage V began'); } setObjective(); }
  function currentChoices(){ if(G.encounter) return encounterChoices(G); if(G.stage===1) return stage1Choices(); if(G.stage===2) return stage2Choices(); if(G.stage===3) return stage3to5Choices(3); if(G.stage===4) return stage3to5Choices(4); return stage3to5Choices(5); }
  function startThreatEncounter(tier){ const threat=G.currentThreat||chooseThreat(); if(!threat) return; const kind=rand(2)===0?'creature':'hazard'; const name=kind==='creature'?threat.creature:threat.hazard; G.telemetry.encounters++; beginEncounter(G,kind,name,tier||'standard'); }
  function handleDeath(){ G.deathCount+=1; if(G.stage===5){ G.stage5Dead=true; G.lastResult='The final line breaks. This run ends here.'; saveLegend('Permadeath'); persist(); render(); return; } const oldLoc=getLocality(G.location); const rescue=(window.RESCUE_PROFILES||{})[G.location]||{rescuer:'unrecorded rescuers',aftermath:'The cost is real even if the names are not.',safeZone:oldLoc.safeZone}; const next=((window.ADJACENCY[G.location]||[])[0]) || G.location; const nextLoc=getLocality(next); G.location=next; G.currentSafeZone=rescue.safeZone || nextLoc.safeZone; G.safeZoneHistory.unshift(`${G.currentSafeZone} (${nextLoc.name})`); G.safeZoneHistory=G.safeZoneHistory.slice(0,10); G.hp=Math.max(6,Math.floor(G.maxHp*0.4)); G.fatigue+=2; G.gold=Math.max(0,G.gold-3); G.wounds.push(`Near-death at ${oldLoc.name}`); G.wounds=G.wounds.slice(0,6); G.worldClocks.rival+=2; G.worldClocks.pressure+=1; G.telemetry.rescues++; G.companions.forEach(c=>{ if(rand(4)===0){ c.injured=true; c.available=false; c.trust=Math.max(0,(c.trust||1)-1); } }); G.rescueLog.unshift(`Recovered near ${oldLoc.name} by ${rescue.rescuer}; carried to ${G.currentSafeZone}. ${rescue.aftermath}`); G.rescueLog=G.rescueLog.slice(0,10); G.lastResult=`${oldLoc.name} is lost for now. ${rescue.rescuer[0].toUpperCase()+rescue.rescuer.slice(1)} bring the party to ${G.currentSafeZone}. ${rescue.aftermath}`; markMoment(`Rescued after near-death at ${oldLoc.name}`); setThreat(); setObjective(); }
  function saveLegend(finalOutcome){ const bg=getBackground(G.archetype,G.backgroundId); const arch=getArchetype(G.archetype); const loc=getLocality(routeSignature().originLocality); G.legends.unshift({name:G.name, archetypeName:arch.name, backgroundName:bg.name, originLocalityName:loc.name, lifeOverview:G.lifeOverview, keyMoments:[...G.keyMoments], safeZones:[...G.safeZoneHistory], finalOutcome, stage5Dead:G.stage5Dead, familyEdges:[...(G.familyEdges||[])], rescueLog:[...G.rescueLog], routeScoutLog:[...G.routeScoutLog], companions:G.companions.map(c=>c.name), dayCount:G.dayCount, level:G.level}); G.legends=G.legends.slice(0,20); }
  function legendLines(){ return G.legends.map((l,i)=>`<div class='card'><b>${i+1}. ${l.name}</b><div>${legendSummary(l)}</div></div>`).join('')||'<div class="card">No legends recorded yet.</div>'; }
  function journalLines(){ return G.journalRecords.map(r=>`<div class='card'><b>${r.category}</b><div>Day ${r.day} · ${getLocality(r.locality)?.name||r.locality}</div><div>${r.text}</div></div>`).join('')||'<div class="card">No journal records yet.</div>'; }
  function noticesLines(){ const noticeHtml = G.notices.map(n=>`<div class='card'>${n}</div>`).join(''); return `<div class='notice-list'>${noticeHtml||'<div class="card">No notices yet.</div>'}</div>`; }
  function npcsLines(){ return currentNamedPlacements(G.location).map(n=>`<div class='card'><b>${n.id.replace(/_/g,' ')}</b><div>${n.role} · ${n.office}</div></div>`).join('')||'<div class="card">No named placements surfaced here yet.</div>'; }
  function campLines(){ return campChoices(G).map((c,i)=>`<button class='choice small' data-camp='${i}'>${c.label}</button>`).join(''); }
  function mapLines(){ const sig=routeSignature(); const atlas=routeAtlasFor(sig); const fam=familyTitleForStage2(sig); const top=`<div class='card'><div class='sectionTitle'>Current Vector</div><b>${window.ROUTE_NAMES[sig.stage2Vector]}</b><div>${atlas.style}</div><div>Risk: ${atlas.risk}</div><div>${atlas.note}</div><div><span class='muted'>Family:</span> ${fam}</div></div>`; const adj=(window.ADJACENCY[G.location]||[]).map(dest=>{ const dl=getLocality(dest); const seen=G.stage2DestinationsSeen[dest]?'Seen':'Unseen'; const preview=destinationStage2Content(dest)[0]; return `<div class='card'><b>${dl.name}</b><div>${dl.summary}</div><div><span class='muted'>Status:</span> ${seen}</div><div><span class='muted'>Pressure:</span> ${preview?preview.label:'Adjacent pressure not yet surfaced.'}</div></div>`; }).join(''); return top+(adj||'<div class="card">No adjacent routes surfaced here yet.</div>'); }
  function poiActions(){ const locPois=(window.SETTLEMENT_POIS||{})[G.location]||{}; const group=getArchetype(G.archetype).group; const basePool=(window.SERVICE_ITEM_POOLS||{})[group]||[]; const localPool=((window.LOCALITY_SERVICE_ITEM_OVERRIDES||{})[G.location]||{})[group]||[]; const itemPool=[...localPool,...basePool]; return Object.entries(locPois).map(([key,poi])=>({key,poi,itemPool,action:()=>{ advanceTime(1); G.telemetry.turns++; G.telemetry.services++; if(key==='recovery'){ G.hp=Math.min(G.maxHp,G.hp+5); G.fatigue=Math.max(0,G.fatigue-2); G.lastResult=`${poi.name} steadies the body and lowers immediate strain.`; }
      else if(key==='equipment'){ const item=itemPool[(G.dayCount+G.level)%itemPool.length]; if(G.gold>=item.cost){ G.gold-=item.cost; G.inventory.unshift(item); G.inventory=G.inventory.slice(0,30); G.equipment[item.slot]=item; G.lastResult=`${poi.name} equips ${item.name}. ${item.text}`; } else G.lastResult=`${poi.name} offers what would help, but not at the coin currently on hand.`; }
      else if(key==='info'){ gainXp(1,'settlement information'); addJournal('information', `${poi.name}: ${poi.text}`, `${G.location}-${key}-${G.dayCount}`); G.lastResult=`${poi.name} turns rumor into something more actionable.`; }
      else if(key==='progression'){ const focus=getArchetype(G.archetype).focus; G.skills[focus]=(G.skills[focus]||0)+1; gainXp(1,'local progression'); G.lastResult=`${poi.name} sharpens ${focus} into a more reliable edge.`; }
      else if(key==='flavor'){ G.renown+=1; addJournal('locality', `${poi.name}: ${poi.text}`, `${G.location}-${key}`); G.lastResult=`${poi.name} makes the place feel fully inhabited and harder to mistake for anywhere else.`; }
      else if(key==='secret'){ G.settlementSecrets[G.location]=true; G.gold+=3; addJournal('secret', `${poi.name}: ${poi.text}`, `${G.location}-secret`); G.lastResult=`${poi.name} yields a hidden leverage point and a small practical gain.`; }
      G.serviceLog.unshift(`${poi.name} (${key}) at ${getLocality(G.location).name}`); G.serviceLog=G.serviceLog.slice(0,20); setThreat(); persist(); render(); }})); }
  function servicesLines(){ return poiActions().map((p,i)=>{ const stock = p.key==='equipment' && p.itemPool.length ? `<div><span class='muted'>Stock:</span> ${p.itemPool.slice(0,2).map(x=>x.name).join(', ')}</div>` : ''; return `<div class='card'><div class='sectionTitle'>${p.key}</div><b>${p.poi.name}</b><div>${p.poi.text}</div>${stock}<button class='choice small' data-service='${i}'>Use ${p.poi.name}</button></div>`; }).join('') || '<div class="card">No meaningful services surfaced here yet.</div>'; }
  function sheetLines(){ const arch=getArchetype(G.archetype), bg=getBackground(G.archetype,G.backgroundId); updateSignals(); const inv=(G.inventory||[]).slice(0,6).map(i=>i.name).join(', ')||'None'; const eq=Object.entries(G.equipment||{}).map(([slot,item])=>`${slot}: ${item.name}`).join(' · ')||'None'; return `<div class='card'><div class='sectionTitle'>Identity</div><b>${arch.name}</b> · ${bg.name}<br>${G.stageLabel}<br>${buildAuditText()}<br>${G.lifeOverview}</div><div class='card'><div class='sectionTitle'>State</div>Objective: ${G.currentObjective}<br>Companions: ${G.companions.map(c=>c.name).join(', ') || 'None'}<br>Family edges: ${familyEdgesText()}<br>Stage II destinations seen: ${Object.keys(G.stage2DestinationsSeen||{}).length}<br>Rescues: ${G.rescueLog.length} · Legends: ${G.legends.length}<br>Telemetry: ${G.telemetry.actions} actions · ${G.telemetry.encounters} encounters · ${G.telemetry.services} services</div><div class='card'><div class='sectionTitle'>Readiness</div>${Object.values(G.signals||{}).join(' · ')}</div><div class='card'><div class='sectionTitle'>Equipment</div>${eq}<br><span class='muted'>Inventory:</span> ${inv}</div>`; }
  function renderChoices(){ const list=currentChoices(); $('choices').innerHTML=list.map((c,i)=>`<button class='choice' data-choice='${i}'><span>${c.label}</span><small>${(c.tags||[]).join(' · ')}</small></button>`).join(''); [...document.querySelectorAll('[data-choice]')].forEach(btn=>btn.onclick=()=>{ const c=list[+btn.dataset.choice]; c.fn(); if(G.hp<=0 && !G.stage5Dead) handleDeath(); setThreat(); setObjective(); persist(); render(); }); }
  function render(){ updateStage(); setObjective(); updateSignals(); const sig=routeSignature(); const atlas=routeAtlasFor(sig); $('title').textContent=`Ledger of Ash — Upgrade Batch 27`; $('header').textContent=`${getLocality(G.location).name} · Day ${G.dayCount} · ${['Dawn','Morning','Midday','Late Day','Night'][G.timeIndex]} · Level ${G.level}`; $('stats').textContent=`${getArchetype(G.archetype).name} · ${getBackground(G.archetype,G.backgroundId).name} · HP ${G.hp}/${G.maxHp} · Renown ${G.renown} · Gold ${G.gold}`; $('narrative').textContent=localityNarrative(G,getLocality(G.location),{pressure:pick(getLocality(G.location).pressures,G.worldClocks.pressure),routeHint:window.ROUTE_NAMES[sig.stage2Vector],routeStyle:atlas.style,routeRisk:atlas.risk,hazardHint:G.currentThreat?.hazard,creatureHint:G.currentThreat?.creature,namedHint:currentNamedPlacements(G.location).map(n=>`${n.id.replace(/_/g,' ')} at ${n.office}`).join('; '), serviceHint:(G.serviceLog[0]||''), familyHint:familyTitleForStage2(sig), destinationHint:Object.keys(G.stage2DestinationsSeen||{}).length?`The widening route now carries remembered names like ${Object.keys(G.stage2DestinationsSeen).slice(0,2).map(id=>getLocality(id).name).join(' and ')}.`:''}); $('result').textContent=resultNarrative(G.lastResult); $('mapPanel').innerHTML=mapLines(); $('servicesPanel').innerHTML=servicesLines(); $('sheetPanel').innerHTML=sheetLines(); $('journalPanel').innerHTML=journalLines(); $('noticesPanel').innerHTML=noticesLines(); $('npcsPanel').innerHTML=npcsLines(); $('campPanel').innerHTML=campLines(); $('legendsPanel').innerHTML=legendLines(); renderChoices(); [...document.querySelectorAll('[data-camp]')].forEach(btn=>btn.onclick=()=>{ const choice=campChoices(G)[+btn.dataset.camp]; choice.fn(); persist(); render(); }); [...document.querySelectorAll('[data-service]')].forEach(btn=>btn.onclick=()=>{ const action=poiActions()[+btn.dataset.service]; action.action(); }); }
  function fillSelectors(){ const archSel=$('archSelect'); archSel.innerHTML=window.ARCHETYPES.map(a=>`<option value='${a.id}'>${a.name}</option>`).join(''); $('ageSelect').innerHTML=['18','21','24','28','34','41','53'].map(v=>`<option value='${v}'>Age ${v}</option>`).join(''); $('presentationSelect').innerHTML=['Male','Female','Non-Gendered'].map(v=>`<option value='${v}'>${v}</option>`).join(''); function fillBg(){ const ids=window.BACKGROUNDS[archSel.value]||[]; $('bgSelect').innerHTML=ids.map(b=>`<option value='${b.id}'>${b.name} — ${getLocality(b.originLocality).name}</option>`).join(''); } archSel.onchange=fillBg; fillBg(); }
  function beginNew(){ G=defaultState(); G.name=$('newName').value.trim()||'Nameless'; G.passcode=$('newCode').value.trim() || ('0000'+rand(10000)).slice(-4); G.archetype=$('archSelect').value; G.backgroundId=$('bgSelect').value; G.age=$('ageSelect').value; G.presentation=$('presentationSelect').value; const arch=getArchetype(G.archetype); const bg=getBackground(G.archetype,G.backgroundId); G.location=bg.originLocality; const lineages=(window.LOCALITY_LINEAGES||{})[G.location] || ['Human']; G.lineage=lineages[0]; G.currentSafeZone=bg.firstSafeZone; G.safeZoneHistory=[bg.firstSafeZone]; G.maxHp=20 + (arch.group==='combat'?4:arch.group==='support'?2:0); G.hp=G.maxHp; G.skills[arch.focus]=(G.skills[arch.focus]||0)+1; (window.STARTING_LOADOUT_BY_GROUP[arch.group]||[]).forEach((name,idx)=>G.inventory.push({name,slot:['weapon','kit','belt'][idx]||'kit',bonus:{}})); G.lifeOverview=window.lifeOverviewText?lifeOverviewText(G):`${G.name} starts in ${getLocality(G.location).name}.`; addQuest('stage1', bg.firstObjective, 'Active'); setThreat(); setObjective(); persist(); render(); }
  function loadLegend(){ const code=$('loadCode').value.trim(); const all=storage(); const found=all[code]; if(!found){ alert('Legend not found.'); return; } G=found; if(!G.familyEdges) G.familyEdges=[]; if(!G.telemetry) G.telemetry={turns:0,actions:0,travels:0,scouts:0,encounters:0,wins:0,rescues:0,services:0}; if(!G.inventory) G.inventory=[]; if(!G.equipment) G.equipment={}; if(!G.serviceLog) G.serviceLog=[]; render(); }
  window.addEventListener('DOMContentLoaded',()=>{ fillSelectors(); $('beginBtn').onclick=beginNew; $('loadBtn').onclick=loadLegend; G=defaultState(); G.lifeOverview='Create a new legend to enter the world.'; setThreat(); render(); });
})();
</script>
